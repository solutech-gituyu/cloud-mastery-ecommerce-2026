name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      DEPLOYER_SERVICE_ACCOUNT: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT_EMAIL || secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      BACKEND_SERVICE_NAME: ${{ secrets.CLOUD_RUN_BACKEND_SERVICE_NAME }}
      FRONTEND_SERVICE_NAME: ${{ secrets.CLOUD_RUN_FRONTEND_SERVICE_NAME }}
      CART_AGENT_FUNCTION_NAME: cart-agent
      CONNECT_BIGQUERY_FUNCTION_NAME: sync-mysql-to-bq
      SEARCH_PRODUCTS_FUNCTION_NAME: search-products
      BQ_DATASET: ${{ vars.BQ_DATASET || 'cloud_mastery' }}
      BQ_PRODUCTS_TABLE: ${{ vars.BQ_PRODUCTS_TABLE || 'products' }}
      CONNECT_BIGQUERY_TABLES: ${{ vars.CONNECT_BIGQUERY_TABLES || 'table_parts_catalog,table_finance,orders,order_details,customers,products' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          : "${{ secrets.GCP_PROJECT_ID }}"
          : "${{ secrets.GCP_REGION }}"
          : "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}"
          : "${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT_EMAIL || secrets.GCP_SERVICE_ACCOUNT_EMAIL }}"
          : "${{ secrets.CLOUD_RUN_BACKEND_SERVICE_NAME }}"
          : "${{ secrets.CLOUD_RUN_FRONTEND_SERVICE_NAME }}"
          : "${{ secrets.CLOUDSQL_INSTANCE_CONNECTION_NAME }}"
          : "${{ secrets.MYSQL_PRISMA_URL }}"
          : "${{ secrets.DB_USER }}"
          : "${{ secrets.DB_PASSWORD || secrets.DB_PASS }}"
          : "${{ secrets.DB_NAME }}"
          : "${{ secrets.FRONTEND_NEXT_PUBLIC_CHAT_DEPLOYMENT || secrets.NEXT_PUBLIC_CHAT_DEPLOYMENT }}"
          : "${{ secrets.FRONTEND_NEXT_PUBLIC_CHAT_TITLE || secrets.NEXT_PUBLIC_CHAT_TITLE }}"
          : "${{ secrets.FRONTEND_NEXT_PUBLIC_CART_API_URL || secrets.NEXT_PUBLIC_CART_API_URL }}"

      - name: Authenticate to Google Cloud with Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          install_components: 'beta'

      - name: Prepare lowercase image tags
        run: |
          sanitize_cloud_run_name() {
            local raw="$1"
            local lowered
            lowered="$(echo "$raw" | tr '[:upper:]' '[:lower:]')"
            lowered="$(echo "$lowered" | sed -E 's/[^a-z0-9-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//')"
            lowered="${lowered:0:63}"
            lowered="$(echo "$lowered" | sed -E 's/-+$//')"
            if [[ -z "$lowered" ]]; then
              lowered="app"
            fi
            echo "$lowered"
          }

          sanitize_function_name() {
            local raw="$1"
            local lowered
            lowered="$(echo "$raw" | tr '[:upper:]' '[:lower:]')"
            lowered="$(echo "$lowered" | sed -E 's/[^a-z0-9-]+/-/g; s/-+/-/g; s/^-+//; s/-+$//')"
            if [[ ! "$lowered" =~ ^[a-z] ]]; then
              lowered="fn-${lowered}"
            fi
            lowered="${lowered:0:63}"
            lowered="$(echo "$lowered" | sed -E 's/-+$//')"
            if [[ -z "$lowered" ]]; then
              lowered="fn-app"
            fi
            echo "$lowered"
          }

          PROJECT_ID_LC="$(echo "$PROJECT_ID" | tr '[:upper:]' '[:lower:]')"
          BACKEND_SERVICE_SAFE="$(sanitize_cloud_run_name "$BACKEND_SERVICE_NAME")"
          FRONTEND_SERVICE_SAFE="$(sanitize_cloud_run_name "$FRONTEND_SERVICE_NAME")"
          CART_AGENT_FUNCTION_SAFE="$(sanitize_function_name "$CART_AGENT_FUNCTION_NAME")"
          CONNECT_BIGQUERY_FUNCTION_SAFE="$(sanitize_function_name "$CONNECT_BIGQUERY_FUNCTION_NAME")"
          SEARCH_PRODUCTS_FUNCTION_SAFE="$(sanitize_function_name "$SEARCH_PRODUCTS_FUNCTION_NAME")"

          echo "BACKEND_SERVICE_NAME_SAFE=${BACKEND_SERVICE_SAFE}" >> "$GITHUB_ENV"
          echo "FRONTEND_SERVICE_NAME_SAFE=${FRONTEND_SERVICE_SAFE}" >> "$GITHUB_ENV"
          echo "CART_AGENT_FUNCTION_NAME_SAFE=${CART_AGENT_FUNCTION_SAFE}" >> "$GITHUB_ENV"
          echo "CONNECT_BIGQUERY_FUNCTION_NAME_SAFE=${CONNECT_BIGQUERY_FUNCTION_SAFE}" >> "$GITHUB_ENV"
          echo "SEARCH_PRODUCTS_FUNCTION_NAME_SAFE=${SEARCH_PRODUCTS_FUNCTION_SAFE}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=gcr.io/${PROJECT_ID_LC}/${BACKEND_SERVICE_SAFE}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=gcr.io/${PROJECT_ID_LC}/${FRONTEND_SERVICE_SAFE}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Configure Docker for Google Cloud
        run: |
          gcloud auth configure-docker

      # Build and push backend
      - name: Build backend Docker image
        run: |
          docker build -t $BACKEND_IMAGE ./backend

      - name: Push backend Docker image
        run: |
          docker push $BACKEND_IMAGE

      - name: Sync MYSQL_PRISMA_URL to Secret Manager
        run: |
          if gcloud secrets describe MYSQL_PRISMA_URL --project "$PROJECT_ID" >/dev/null 2>&1; then
            echo -n "${{ secrets.MYSQL_PRISMA_URL }}" | gcloud secrets versions add MYSQL_PRISMA_URL \
              --project "$PROJECT_ID" \
              --data-file=- \
              --quiet
          else
            echo -n "${{ secrets.MYSQL_PRISMA_URL }}" | gcloud secrets create MYSQL_PRISMA_URL \
              --project "$PROJECT_ID" \
              --data-file=- \
              --replication-policy=automatic \
              --quiet
          fi

      - name: Normalize MYSQL_PRISMA_URL binding type
        run: |
          gcloud run services update "$BACKEND_SERVICE_NAME_SAFE" --region "$REGION" --project "$PROJECT_ID" --remove-env-vars MYSQL_PRISMA_URL --quiet || true
          gcloud run services update "$BACKEND_SERVICE_NAME_SAFE" --region "$REGION" --project "$PROJECT_ID" --remove-secrets MYSQL_PRISMA_URL --quiet || true

      # Deploy backend to Cloud Run
      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy $BACKEND_SERVICE_NAME_SAFE \
            --image $BACKEND_IMAGE \
            --region $REGION \
            --service-account=$DEPLOYER_SERVICE_ACCOUNT \
            --port 8080 \
            --allow-unauthenticated \
            --set-secrets "MYSQL_PRISMA_URL=MYSQL_PRISMA_URL:latest" \
            --add-cloudsql-instances=${{ secrets.CLOUDSQL_INSTANCE_CONNECTION_NAME }}

        # Run Prisma migrations and seed database
          # Download and start Cloud SQL Auth Proxy
      - name: Download Cloud SQL Auth Proxy
        run: |
          wget https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64 -O cloud_sql_proxy
          chmod +x cloud_sql_proxy
      - name: Start Cloud SQL Auth Proxy
        run: |
          ./cloud_sql_proxy ${{ secrets.CLOUDSQL_INSTANCE_CONNECTION_NAME }} --address 127.0.0.1 --port 3306 &

      - name: Wait for Cloud SQL Proxy
        run: |
          for i in {1..30}; do
            nc -z 127.0.0.1 3306 && exit 0
            sleep 1
          done
          echo "Cloud SQL Proxy did not become ready on port 3306"
          exit 1

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run Prisma migrations
        run: |
          cd backend
          npm run prisma:migrate:deploy
        env:
          MYSQL_PRISMA_URL: "mysql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD || secrets.DB_PASS }}@127.0.0.1:3306/${{ secrets.DB_NAME }}"

       # Retrieve backend Cloud Run URL
      - name: Get backend Cloud Run URL
        id: get-backend-url
        run: |
          BACKEND_URL=$(gcloud run services describe $BACKEND_SERVICE_NAME_SAFE --region $REGION --format='value(status.url)')
          echo "BACKEND_URL=$BACKEND_URL" >> $GITHUB_ENV

      # Build and push frontend
      - name: Build frontend Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${BACKEND_URL}/api/v1" \
            --build-arg NEXT_PUBLIC_CART_API_URL="${{ secrets.FRONTEND_NEXT_PUBLIC_CART_API_URL || secrets.NEXT_PUBLIC_CART_API_URL }}" \
            --build-arg NEXT_PUBLIC_CHAT_DEPLOYMENT="${{ secrets.FRONTEND_NEXT_PUBLIC_CHAT_DEPLOYMENT || secrets.NEXT_PUBLIC_CHAT_DEPLOYMENT }}" \
            --build-arg NEXT_PUBLIC_CHAT_TITLE="${{ secrets.FRONTEND_NEXT_PUBLIC_CHAT_TITLE || secrets.NEXT_PUBLIC_CHAT_TITLE }}" \
            -t $FRONTEND_IMAGE ./frontend

      - name: Push frontend Docker image
        run: |
          docker push $FRONTEND_IMAGE
          
      # Deploy frontend to Cloud Run
      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy $FRONTEND_SERVICE_NAME_SAFE \
            --image $FRONTEND_IMAGE \
            --region $REGION \
            --port 3000 \
            --allow-unauthenticated

      - name: Deploy Cart Agent Cloud Function (Gen2)
        run: |
          gcloud functions deploy $CART_AGENT_FUNCTION_NAME_SAFE \
            --gen2 \
            --region $REGION \
            --runtime python311 \
            --entry-point cart_agent \
            --source ./Cart-agent \
            --trigger-http \
            --allow-unauthenticated \
            --memory 512Mi \
            --timeout 120s \
            --set-env-vars "GCP_PROJECT_ID=$PROJECT_ID,BQ_PROJECT=$PROJECT_ID,BQ_DATASET=$BQ_DATASET,BQ_PRODUCTS_TABLE=$BQ_PRODUCTS_TABLE"

      - name: Deploy Connect BigQuery Cloud Function (Gen2)
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || secrets.DB_PASS }}
        run: |
          gcloud functions deploy $CONNECT_BIGQUERY_FUNCTION_NAME_SAFE \
            --gen2 \
            --region $REGION \
            --runtime python311 \
            --entry-point sync_mysql_to_bq \
            --source ./Connect-bigquery \
            --trigger-http \
            --allow-unauthenticated \
            --memory 512Mi \
            --timeout 300s \
            --set-env-vars "GCP_PROJECT_ID=$PROJECT_ID,BQ_PROJECT=$PROJECT_ID,BQ_DATASET=$BQ_DATASET,CLOUDSQL_INSTANCE_CONNECTION_NAME=${{ secrets.CLOUDSQL_INSTANCE_CONNECTION_NAME }},DB_NAME=${{ secrets.DB_NAME }},DB_USER=${{ secrets.DB_USER }},DB_PASSWORD=$DB_PASSWORD,CONNECT_BIGQUERY_TABLES=$CONNECT_BIGQUERY_TABLES"

      - name: Deploy Search Products Cloud Function (Gen2)
        run: |
          gcloud functions deploy $SEARCH_PRODUCTS_FUNCTION_NAME_SAFE \
            --gen2 \
            --region $REGION \
            --runtime python311 \
            --entry-point search_product \
            --source ./Search-products \
            --trigger-http \
            --allow-unauthenticated \
            --memory 512Mi \
            --timeout 120s \
            --set-env-vars "GCP_PROJECT_ID=$PROJECT_ID,BQ_PROJECT=$PROJECT_ID,BQ_DATASET=$BQ_DATASET,BQ_PRODUCTS_TABLE=$BQ_PRODUCTS_TABLE"
